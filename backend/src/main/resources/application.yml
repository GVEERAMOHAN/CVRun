server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

app:
  workflow:
    cache:
      ttl-minutes: 30
      cleanup-interval-seconds: 60
  ai:
    provider: stub # Options: stub, gemini, openai
    gemini:
      api-key: ${GEMINI_API_KEY:}
      model: gemini-2.5-flash
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: gpt-4o-mini
